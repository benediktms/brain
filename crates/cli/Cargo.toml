[package]
name = "cli"
version.workspace = true
edition.workspace = true
repository = "https://github.com/benediktms/brain"
description = "A local-first personal second brain with token-budgeted retrieval for AI agents"
homepage = "https://github.com/benediktms/brain"

[[bin]]
name = "brain"
path = "src/main.rs"

[dependencies]
brain-lib = { path = "../brain_lib" }
tokio = { workspace = true, features = ["signal"] }
anyhow = { workspace = true }
tracing = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
tracing-subscriber = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
toml = "0.8"
libc = "0.2"
dirs = "6"
