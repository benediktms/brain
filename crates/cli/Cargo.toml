[package]
name = "brain"
version.workspace = true
edition.workspace = true
repository = "https://github.com/benediktms/brain"
description = "A local-first personal second brain with token-budgeted retrieval for AI agents"
homepage = "https://github.com/benediktms/brain"

[[bin]]
name = "brain"
path = "src/main.rs"

[dependencies]
brain-lib = { path = "../brain_lib" }
brain-persistence = { path = "../brain_persistence" }
tokio = { workspace = true, features = ["signal", "net"] }
tokio-util = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
toml = "0.8"
libc = "0.2"
dirs = "6"
notify-debouncer-full = "0.7"
rusqlite = { workspace = true }
blake3 = { workspace = true }

[dev-dependencies]
assert_cmd = "2.2.0"
predicates = "3.1.4"
tempfile = "3.26.0"
