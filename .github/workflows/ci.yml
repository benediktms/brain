name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate PR commit messages
        run: |
          pattern='^(feat|fix|refactor|perf|docs|test|chore|ci|build)(\([a-zA-Z0-9_/-]+\))?!?: .+'
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          failed=0
          while IFS= read -r msg; do
            # Skip merge commits, revert commits, fixup/squash commits
            case "$msg" in
              Merge\ *|Revert\ *|fixup\!*|squash\!*) continue ;;
            esac
            if ! echo "$msg" | grep -qE "$pattern"; then
              echo "FAIL: $msg"
              failed=1
            else
              echo "OK:   $msg"
            fi
          done < <(git log --format=%s "$base..$head")
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "One or more commit messages do not follow Conventional Commits."
            echo "Allowed types: feat, fix, refactor, perf, docs, test, chore, ci, build"
            echo "Format: <type>[(scope)][!]: <description>"
            exit 1
          fi

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo check --workspace
      - run: cargo check --workspace --tests

  check-no-defaults:
    # Verifies that `cargo check --workspace --no-default-features` succeeds —
    # ensures the `embed` feature gate actually compiles cleanly without the
    # candle stack. Prevents feature-gate rot: anyone adding a new unconditional
    # reference to brain-embedder or `crate::embedder::` items will fail here.
    name: Check (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo check --workspace --no-default-features
      - run: cargo check --workspace --no-default-features --tests

  test-tasks-only:
    # Exercises the runtime tasks-only soft-gate by running tests that
    # construct `IndexPipeline::tasks_only` under `--no-default-features
    # --features test-utils`. Catches regressions where the embedder Option
    # gate is bypassed and `crate::embedder::embed_batch_async` stub is hit
    # at runtime (would surface as a test failure rather than a silent
    # behavioural change). Faster than the full Test job because it only
    # runs the `tasks_only_smoke` integration test.
    name: Test (tasks-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo nextest run -p brain-lib --no-default-features --features test-utils --test tasks_only_smoke --profile ci

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace -- -D warnings

  test:
    # Sharded by package to avoid runner-disk ENOSPC during workspace link.
    # The full `cargo nextest run --workspace` previously linked ~300 rlibs at
    # once (embed stack: candle/tokenizers/lance/datafusion/geo), which exceeded
    # the standard runner's free disk. Each shard gets its own runner-disk.
    #
    # Shards:
    #   brain-lib — heaviest crate (embed stack lives here)
    #   cli       — `brain` binary + assert_cmd integration tests (also pulls
    #                brain-lib transitively, hence its own shard)
    #   leaves    — brain_core, brain_embedder, brain_persistence, brain_tasks
    name: Test (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: brain-lib
            args: -p brain-lib
          - shard: cli
            args: -p brain
          - shard: leaves
            args: --workspace --exclude brain-lib --exclude brain
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.shard }}
      - uses: taiki-e/install-action@nextest
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo nextest run ${{ matrix.args }} --profile ci
      - run: cargo test --doc ${{ matrix.args }}

  test-perf:
    name: Perf Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: ulimit -n 4096 && cargo nextest run -p brain-lib --test perf_tests --run-ignored only --test-threads 1 --profile ci
