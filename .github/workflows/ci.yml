name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate PR commit messages
        run: |
          pattern='^(feat|fix|refactor|perf|docs|test|chore|ci|build)(\([a-zA-Z0-9_/-]+\))?!?: .+'
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          failed=0
          while IFS= read -r msg; do
            # Skip merge commits, revert commits, fixup/squash commits
            case "$msg" in
              Merge\ *|Revert\ *|fixup\!*|squash\!*) continue ;;
            esac
            if ! echo "$msg" | grep -qE "$pattern"; then
              echo "FAIL: $msg"
              failed=1
            else
              echo "OK:   $msg"
            fi
          done < <(git log --format=%s "$base..$head")
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "One or more commit messages do not follow Conventional Commits."
            echo "Allowed types: feat, fix, refactor, perf, docs, test, chore, ci, build"
            echo "Format: <type>[(scope)][!]: <description>"
            exit 1
          fi

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: mozilla-actions/sccache-action@v0.0.5
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: "true"
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo check --workspace --locked
      - run: cargo check --workspace --tests --locked
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.5
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: "true"
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace --locked -- -D warnings
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.5
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: "true"
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace --locked
      - name: sccache stats
        if: always()
        run: sccache --show-stats

  test-perf:
    name: Perf Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.5
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: "true"
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: ulimit -n 4096 && cargo test -p brain-lib --test perf_tests --locked -- --ignored --test-threads=1
      - name: sccache stats
        if: always()
        run: sccache --show-stats
